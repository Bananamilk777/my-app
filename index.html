<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추첨기</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #f7f1e3;
      --bg-2: #f3d9b1;
      --ink: #1f1a17;
      --accent: #c8553d;
      --accent-dark: #8f3727;
      --card: rgba(255, 250, 240, 0.88);
      --line: rgba(31, 26, 23, 0.08);
      --muted: rgba(31, 26, 23, 0.7);
      --surface: rgba(31, 26, 23, 0.08);
      --shadow: rgba(31, 26, 23, 0.12);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg-1: #121722;
      --bg-2: #26344a;
      --ink: #f3efe7;
      --accent: #ff8a5b;
      --accent-dark: #e06a3b;
      --card: rgba(16, 21, 30, 0.84);
      --line: rgba(255, 255, 255, 0.1);
      --muted: rgba(243, 239, 231, 0.72);
      --surface: rgba(255, 255, 255, 0.08);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.45), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      transition: background 0.25s ease, color 0.25s ease;
    }

    .app {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(10px);
      transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 28px 0 24px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: var(--surface);
      color: var(--ink);
    }

    .secondary:hover {
      background: color-mix(in srgb, var(--surface) 78%, var(--ink));
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      min-height: 72px;
    }

    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.15);
      animation: pop 0.35s ease;
    }

    .bonus-label {
      width: 100%;
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .status {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 0.95rem;
      color: var(--muted);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.75);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 24px;
        border-radius: 22px;
      }

      .ball {
        width: 56px;
        height: 56px;
        font-size: 1.1rem;
      }
    }

    /* Contact Form Styles */
    .contact-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px dashed var(--line);
    }

    .contact-section h2 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .contact-section p {
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .form-group input,
    .form-group textarea {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 85, 61, 0.1);
    }

    .full-width {
      width: 100%;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="secondary" id="themeButton" type="button" aria-pressed="false">&#xB2E4;&#xD06C;&#xBAA8;&#xB4DC;</button>
    </div>
    <h1>로또 번호 추첨기</h1>
    <p>1부터 45까지 중복 없이 6개 번호와 보너스 번호를 뽑습니다.</p>

    <section class="controls">
      <button class="primary" id="drawButton" type="button">번호 추첨</button>
      <button class="secondary" id="resetButton" type="button">초기화</button>
    </section>

    <section id="numbers" class="numbers" aria-live="polite"></section>
    <div id="status" class="status">버튼을 눌러 추첨을 시작하세요.</div>

    <section class="contact-section">
      <h2>제휴 문의</h2>
      <p>궁금한 사항이 있으시면 문의를 남겨주세요.</p>
      <form action="https://formspree.io/f/xwvrnrre" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="primary full-width">문의 보내기</button>
      </form>
    </section>
  </main>

  <script>
    const numbersEl = document.getElementById("numbers");
    const statusEl = document.getElementById("status");
    const drawButton = document.getElementById("drawButton");
    const resetButton = document.getElementById("resetButton");
    const themeButton = document.getElementById("themeButton");
    const storageKey = "theme-preference";

    function getPreferredTheme() {
      const saved = localStorage.getItem(storageKey);
      if (saved === "light" || saved === "dark") {
        return saved;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function updateThemeButton(theme) {
      const isDark = theme === "dark";
      themeButton.textContent = isDark ? "\uB77C\uC774\uD2B8\uBAA8\uB4DC" : "\uB2E4\uD06C\uBAA8\uB4DC";
      themeButton.setAttribute("aria-pressed", String(isDark));
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      updateThemeButton(theme);
    }

    function toggleTheme() {
      const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      localStorage.setItem(storageKey, nextTheme);
      applyTheme(nextTheme);
    }

    function createNumberPool() {
      return Array.from({ length: 45 }, (_, index) => index + 1);
    }

    function pickNumbers() {
      const pool = createNumberPool();

      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      const selected = pool.slice(0, 7).sort((a, b) => a - b);
      const main = selected.slice(0, 6);
      const bonus = selected[6];

      return { main, bonus };
    }

    function getBallColor(number) {
      if (number <= 10) return "#f4b400";
      if (number <= 20) return "#4285f4";
      if (number <= 30) return "#db4437";
      if (number <= 40) return "#0f9d58";
      return "#5f6368";
    }

    function renderBall(number) {
      const ball = document.createElement("div");
      ball.className = "ball";
      ball.textContent = number;
      ball.style.background = getBallColor(number);
      return ball;
    }

    function renderNumbers() {
      const { main, bonus } = pickNumbers();
      numbersEl.innerHTML = "";

      main.forEach((number) => {
        numbersEl.appendChild(renderBall(number));
      });

      const label = document.createElement("div");
      label.className = "bonus-label";
      label.textContent = "보너스 번호";
      numbersEl.appendChild(label);
      numbersEl.appendChild(renderBall(bonus));

      const now = new Date();
      statusEl.textContent = `${now.toLocaleString("ko-KR")} 기준으로 새 번호를 추첨했습니다.`;
    }

    function resetNumbers() {
      numbersEl.innerHTML = "";
      statusEl.textContent = "버튼을 눌러 추첨을 시작하세요.";
    }

    applyTheme(getPreferredTheme());
    drawButton.addEventListener("click", renderNumbers);
    resetButton.addEventListener("click", resetNumbers);
    themeButton.addEventListener("click", toggleTheme);
  </script>
</body>
</html>
