<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추첨기</title>
  <style>
    :root {
      --bg-1: #f7f1e3;
      --bg-2: #f3d9b1;
      --ink: #1f1a17;
      --accent: #c8553d;
      --accent-dark: #8f3727;
      --card: rgba(255, 250, 240, 0.88);
      --line: rgba(31, 26, 23, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(31, 26, 23, 0.12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: rgba(31, 26, 23, 0.7);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 28px 0 24px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: rgba(31, 26, 23, 0.08);
      color: var(--ink);
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      min-height: 72px;
    }

    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.15);
      animation: pop 0.35s ease;
    }

    .bonus-label {
      width: 100%;
      margin-top: 10px;
      font-size: 0.95rem;
      color: rgba(31, 26, 23, 0.6);
    }

    .status {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 0.95rem;
      color: rgba(31, 26, 23, 0.75);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.75);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 24px;
        border-radius: 22px;
      }

      .ball {
        width: 56px;
        height: 56px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>로또 번호 추첨기</h1>
    <p>1부터 45까지 중복 없이 6개 번호와 보너스 번호를 뽑습니다.</p>

    <section class="controls">
      <button class="primary" id="drawButton" type="button">번호 추첨</button>
      <button class="secondary" id="resetButton" type="button">초기화</button>
    </section>

    <section id="numbers" class="numbers" aria-live="polite"></section>
    <div id="status" class="status">버튼을 눌러 추첨을 시작하세요.</div>
  </main>

  <script>
    const numbersEl = document.getElementById("numbers");
    const statusEl = document.getElementById("status");
    const drawButton = document.getElementById("drawButton");
    const resetButton = document.getElementById("resetButton");

    function createNumberPool() {
      return Array.from({ length: 45 }, (_, index) => index + 1);
    }

    function pickNumbers() {
      const pool = createNumberPool();

      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      const selected = pool.slice(0, 7).sort((a, b) => a - b);
      const main = selected.slice(0, 6);
      const bonus = selected[6];

      return { main, bonus };
    }

    function getBallColor(number) {
      if (number <= 10) return "#f4b400";
      if (number <= 20) return "#4285f4";
      if (number <= 30) return "#db4437";
      if (number <= 40) return "#0f9d58";
      return "#5f6368";
    }

    function renderBall(number) {
      const ball = document.createElement("div");
      ball.className = "ball";
      ball.textContent = number;
      ball.style.background = getBallColor(number);
      return ball;
    }

    function renderNumbers() {
      const { main, bonus } = pickNumbers();
      numbersEl.innerHTML = "";

      main.forEach((number) => {
        numbersEl.appendChild(renderBall(number));
      });

      const label = document.createElement("div");
      label.className = "bonus-label";
      label.textContent = "보너스 번호";
      numbersEl.appendChild(label);
      numbersEl.appendChild(renderBall(bonus));

      const now = new Date();
      statusEl.textContent = `${now.toLocaleString("ko-KR")} 기준으로 새 번호를 추첨했습니다.`;
    }

    function resetNumbers() {
      numbersEl.innerHTML = "";
      statusEl.textContent = "버튼을 눌러 추첨을 시작하세요.";
    }

    drawButton.addEventListener("click", renderNumbers);
    resetButton.addEventListener("click", resetNumbers);
  </script>
</body>
</html>
